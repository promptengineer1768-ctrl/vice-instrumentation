name: VICE instrumentation audit
on:
  push:
  pull_request:
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - run: git diff --check HEAD^
      - run: python3 -m pip install pytest
      - run: python3 -m pytest -q tests
