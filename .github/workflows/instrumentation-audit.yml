name: VICE instrumentation audit
on:
  push:
  pull_request:
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git diff --check upstream/v3.10.0...HEAD
      - run: python3 -m pytest -q tests/test_instrumentation_additive.py
