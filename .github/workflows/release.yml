name: VICE instrumentation release
on:
  workflow_dispatch:
  push:
    tags: ['v*']
jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool pkg-config \
            libgtk-3-dev libglew-dev libevdev-dev libcurl4-openssl-dev libsdl2-dev libasound2-dev libpulse-dev libpng-dev zlib1g-dev \
            libreadline-dev dos2unix xa65
      - name: Configure
        run: |
          find . -type f -name '*.sh' -exec chmod +x {} +
          chmod +x configure
          ./configure --enable-sdl2 --disable-gtk3 --without-libcurl
      - name: Build
        run: make -j2
      - name: Package source and binaries
        run: |
          mkdir -p release
          git archive --format=tar.gz --prefix=vice-3.10-instrumented/ HEAD > release/vice-3.10-instrumented-source.tar.gz
          test -x src/x128
          test -x src/x64sc
          test -x src/xvic
          test -x src/xplus4
          tar -czf release/vice-3.10-instrumented-linux.tar.gz src/x128 src/x64sc src/xvic src/xplus4
      - uses: actions/upload-artifact@v4
        with:
          name: vice-3.10-instrumented-run-${{ github.run_number }}
          path: release/*
      - if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            libiconv
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_image
            mingw-w64-x86_64-gtk3
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-libiconv
            mingw-w64-x86_64-zlib
            flex
      - name: Configure and build
        run: |
          find . -type f -name '*.sh' -exec chmod +x {} +
          git clone --depth 1 https://github.com/fachat/xa65.git "$RUNNER_TEMP/xa"
          make -C "$RUNNER_TEMP/xa/xa"
          mkdir -p "$HOME/bin"
          cp "$RUNNER_TEMP/xa/xa/xa" "$HOME/bin/xa"
          export PATH="$HOME/bin:$PATH"
          ./configure --without-libcurl --disable-gtk3
          make -j2
      - name: Package Windows binaries
        run: |
          mkdir -p release
          test -f src/x128.exe
          test -f src/x64sc.exe
          test -f src/xvic.exe
          test -f src/xplus4.exe
          7z a release/vice-3.10-instrumented-windows.zip src/x128.exe src/x64sc.exe src/xvic.exe src/xplus4.exe
      - uses: actions/upload-artifact@v4
        with:
          name: vice-3.10-instrumented-windows-${{ github.run_number }}
          path: release/*
      - if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
  macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: brew install autoconf automake libtool pkg-config sdl2 sdl2_image libpng dos2unix flex xa
      - name: Configure and build
        run: |
          find . -type f -name '*.sh' -exec chmod +x {} +
          chmod +x configure
          ./configure --without-libcurl --disable-gtk3 --disable-dependency-tracking
          make -j2
      - name: Package macOS binaries
        run: |
          mkdir -p release
          test -x src/x128
          test -x src/x64sc
          test -x src/xvic
          test -x src/xplus4
          tar -czf release/vice-3.10-instrumented-macos.tar.gz src/x128 src/x64sc src/xvic src/xplus4
      - uses: actions/upload-artifact@v4
        with:
          name: vice-3.10-instrumented-macos-${{ github.run_number }}
          path: release/*
      - if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
