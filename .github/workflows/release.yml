name: vice-instrumented build
run-name: vice-instrumented build (${{ github.ref_name }})
on:
  workflow_dispatch:
concurrency:
  group: vice-instrumented-build-${{ github.ref }}
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool pkg-config \
            libgtk-3-dev libglew-dev libevdev-dev libcurl4-openssl-dev libsdl2-dev libasound2-dev libpulse-dev libpng-dev zlib1g-dev \
            libreadline-dev dos2unix xa65
      - name: Configure
        run: |
          find . -type f -name '*.sh' -exec chmod +x {} +
          chmod +x configure
          ./configure --enable-sdl2 --disable-gtk3 --without-libcurl
      - name: Build
        run: make -j2
      - name: Package source and binaries
        run: |
          mkdir -p release
          git archive --format=tar.gz --prefix=vice-instrumented-3.10/ HEAD > release/vice-instrumented-3.10-source.tar.gz
          # Use VICE's native install target so the archive contains every
          # configured executable and the data files it needs at runtime.
          chmod +x install-sh
          make install DESTDIR="$PWD/release/stage"
          bindir=$(dirname "$(find release/stage -type f -name c1541 -print -quit)")
          test -x "$bindir/c1541"
          test -x "$bindir/cartconv"
          test -x "$bindir/petcat"
          tar -C release/stage -czf release/vice-instrumented-3.10-linux.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: vice-instrumented-linux-${{ github.run_number }}
          path: release/*
      - if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            p7zip
            zip
            autoconf
            automake
            git
            libiconv
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_image
            mingw-w64-x86_64-gtk3
            mingw-w64-x86_64-glew
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-libiconv
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-ntldd
            flex
      - name: Configure and build
        run: |
          find . -type f -name '*.sh' -exec chmod +x {} +
          git clone --depth 1 https://github.com/fachat/xa65.git "$RUNNER_TEMP/xa"
          make -C "$RUNNER_TEMP/xa/xa"
          mkdir -p "$HOME/bin"
          printf '#!/usr/bin/env bash\nexit 0\n' > "$HOME/bin/icotool"
          chmod +x "$HOME/bin/icotool"
          cp "$RUNNER_TEMP/xa/xa/xa" "$HOME/bin/xa"
          export PATH="$HOME/bin:$PATH"
          export ICONV=true
          # Release binaries run on consumer machines, not just the Actions host.
          # VICE defaults to -march=native, which produced AVX instructions on the
          # hosted runner and 0xC000001D on older Windows CPUs.
          ./configure --without-libcurl --enable-headlessui --disable-arch
          find . -name Makefile -exec sed -i '/ERROR: generated infocontrib.h contains content that is not valid iso-8859-x/,+1d' {} +
          touch Makefile src/Makefile
          printf 'vice_team_t core_team[] = {{0,0,0}};\nvice_team_t ex_team[] = {{0,0,0}};\nchar *doc_team[] = {{0}};\nvice_trans_t trans_team[] = {{0,0,0,0}};\n' > src/infocontrib.h
          touch src/infocontrib.h
          make -j2
      - name: Package Windows binaries
        run: |
          mkdir -p release
          # VICE's native Windows bindist includes all headless emulators,
          # c1541, cartconv and petcat, their runtime DLLs, and system data.
          # The Makefile target passes relative paths for an in-tree build;
          # invoke the upstream script directly with absolute paths instead.
          "$(pwd)/src/arch/headless/make-bindist_win32.sh" \
            --verbose \
            --compiler-exe cc \
            --objdump-exe objdump \
            --strip-exe strip \
            --vice-version 3.10 \
            --enable-arch no \
            --src-dir "$(pwd)" \
            --build-dir "$(pwd)" \
            --cpu-type x86_64 \
            --zip-type zip
          zip_file=$(find . -maxdepth 1 -type f -name '*.zip' -print -quit)
          test -n "$zip_file"
          7z l "$zip_file" | grep -q 'c1541.exe'
          7z l "$zip_file" | grep -q 'cartconv.exe'
          7z l "$zip_file" | grep -q 'petcat.exe'
          mkdir -p release/windows-tools
          cp tools/vice_session.py README.md release/windows-tools/
          (cd release/windows-tools && zip -r ../vice-session-tools.zip .)
          mv "$zip_file" release/vice-instrumented-3.10-windows.zip
      - name: Verify Windows deliverables
        shell: pwsh
        run: |
          if (-not (Test-Path release/vice-instrumented-3.10-windows.zip)) { throw "VICE archive missing" }
          if (-not (Test-Path release/vice-session-tools.zip)) { throw "session tools archive missing" }
          python tools/vice_session.py --help | Out-Null
      - uses: actions/upload-artifact@v4
        with:
          name: vice-instrumented-windows-${{ github.run_number }}
          path: release/*
      - if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
  macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: brew install autoconf automake libtool pkg-config sdl2 sdl2_image libpng dos2unix flex xa
      - name: Configure and build
        run: |
          find . -type f -name '*.sh' -exec chmod +x {} +
          chmod +x configure
          mkdir -p "$HOME/bin"
          ln -sf "$(brew --prefix automake)/bin/aclocal" "$HOME/bin/aclocal-1.16"
          ln -sf "$(brew --prefix automake)/bin/automake" "$HOME/bin/automake-1.16"
          export PATH="$HOME/bin:$PATH"
          ./configure --without-libcurl --disable-gtk3 --disable-dependency-tracking
          make -j2
      - name: Package macOS binaries
        run: |
          mkdir -p release
          # Use VICE's native install target so the archive contains every
          # configured executable and the data files it needs at runtime.
          chmod +x install-sh
          make install DESTDIR="$PWD/release/stage"
          bindir=$(dirname "$(find release/stage -type f -name c1541 -print -quit)")
          test -x "$bindir/c1541"
          test -x "$bindir/cartconv"
          test -x "$bindir/petcat"
          tar -C release/stage -czf release/vice-instrumented-3.10-macos.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: vice-instrumented-macos-${{ github.run_number }}
          path: release/*
      - if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
