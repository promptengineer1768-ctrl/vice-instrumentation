name: VICE instrumentation release
on:
  workflow_dispatch:
  push:
    tags: ['v*']
jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool pkg-config \
            libgtk-3-dev libglew-dev libevdev-dev libcurl4-openssl-dev libsdl2-dev libasound2-dev libpulse-dev libpng-dev zlib1g-dev \
            libreadline-dev dos2unix xa65
      - name: Configure
        run: |
          find . -type f -name '*.sh' -exec chmod +x {} +
          chmod +x configure
          ./configure --enable-sdl2 --disable-gtk3 --without-libcurl
      - name: Build
        run: make -j2
      - name: Package source and binaries
        run: |
          mkdir -p release
          git archive --format=tar.gz --prefix=vice-3.10-instrumented/ HEAD > release/vice-3.10-instrumented-source.tar.gz
          tar -czf release/vice-3.10-instrumented-linux.tar.gz x128 x64sc 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: vice-3.10-instrumented-${{ github.ref_name }}
          path: release/*
      - if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
